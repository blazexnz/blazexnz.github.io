<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="robots" content="noindex, nofollow">
  <title>Meta Ads Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-primary: #0a0a0b;
      --bg-secondary: #111114;
      --bg-card: #16161a;
      --bg-card-hover: #1c1c22;
      --border: #2a2a35;
      --border-light: #222228;

      --accent-green: #00e87a;
      --accent-green-dim: rgba(0, 232, 122, 0.12);
      --accent-red: #ff3b5c;
      --accent-red-dim: rgba(255, 59, 92, 0.12);
      --accent-amber: #ffb800;
      --accent-amber-dim: rgba(255, 184, 0, 0.12);
      --accent-blue: #4d9fff;
      --accent-blue-dim: rgba(77, 159, 255, 0.1);

      --text-primary: #f0f0f5;
      --text-secondary: #8888a0;
      --text-tertiary: #55556a;
      --text-mono: 'Space Mono', monospace;
      --text-sans: 'DM Sans', sans-serif;

      --radius: 12px;
      --radius-sm: 8px;
      --radius-pill: 999px;

      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    html, body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--text-sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body {
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* ─── LAYOUT ─────────────────────────────── */
    .app {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    /* ─── HEADER ─────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .logo {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .logo-label {
      font-family: var(--text-mono);
      font-size: 10px;
      color: var(--text-tertiary);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .logo-title {
      font-family: var(--text-mono);
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .logo-title span {
      color: var(--accent-green);
    }

    .date-badge {
      font-family: var(--text-mono);
      font-size: 11px;
      color: var(--text-tertiary);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      padding: 6px 12px;
    }

    /* ─── PHASE SELECTOR ─────────────────────── */
    .phase-section {
      margin-bottom: 28px;
    }

    .section-label {
      font-family: var(--text-mono);
      font-size: 10px;
      color: var(--text-tertiary);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .phase-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .phase-tabs::-webkit-scrollbar { display: none; }

    .phase-tab {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 10px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .phase-tab .tab-num {
      font-family: var(--text-mono);
      font-size: 10px;
      color: var(--text-tertiary);
      letter-spacing: 0.1em;
    }

    .phase-tab .tab-name {
      font-family: var(--text-sans);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .phase-tab.active {
      background: var(--accent-green-dim);
      border-color: var(--accent-green);
    }

    .phase-tab.active .tab-num {
      color: var(--accent-green);
    }

    .phase-tab.active .tab-name {
      color: var(--text-primary);
    }

    .phase-tab:active {
      background: var(--bg-card-hover);
    }

    .phase-tab.active:active {
      background: var(--accent-green-dim);
    }

    /* ─── ACTIVE PHASE HEADER ────────────────── */
    .phase-header {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .phase-dot {
      width: 8px;
      height: 8px;
      background: var(--accent-green);
      border-radius: 50%;
      margin-top: 6px;
      flex-shrink: 0;
      box-shadow: 0 0 10px var(--accent-green);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .phase-header-content {
      flex: 1;
    }

    .phase-header-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .phase-header-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* ─── OBJECTIVES & ACTIONS ───────────────── */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    @media (max-width: 600px) {
      .two-col { grid-template-columns: 1fr; }
    }

    .info-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }

    .info-card-label {
      font-family: var(--text-mono);
      font-size: 9px;
      color: var(--text-tertiary);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .info-card-label::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent-amber);
    }

    .info-card-label.actions-label::before {
      background: var(--accent-blue);
    }

    .info-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .info-list li {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.4;
      padding-left: 12px;
      position: relative;
    }

    .info-list li::before {
      content: '›';
      position: absolute;
      left: 0;
      color: var(--text-tertiary);
      font-size: 14px;
      line-height: 1.2;
    }

    /* ─── METRICS SECTION ────────────────────── */
    .metrics-label {
      margin-bottom: 10px;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }

    @media (max-width: 480px) {
      .metrics-grid { grid-template-columns: 1fr 1fr; }
    }

    .metric-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      overflow: hidden;
    }

    .metric-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--border);
      transition: background 0.2s;
    }

    .metric-card.pass::before { background: var(--accent-green); }
    .metric-card.fail::before { background: var(--accent-red); }
    .metric-card.neutral::before { background: var(--border); }

    .metric-card.pass {
      background: var(--accent-green-dim);
      border-color: rgba(0, 232, 122, 0.2);
    }

    .metric-card.fail {
      background: var(--accent-red-dim);
      border-color: rgba(255, 59, 92, 0.2);
    }

    .metric-name {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 400;
      line-height: 1.3;
    }

    .metric-bottom {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 6px;
    }

    .metric-input-wrap {
      flex: 1;
      display: flex;
      align-items: baseline;
      gap: 3px;
    }

    .metric-prefix {
      font-family: var(--text-mono);
      font-size: 13px;
      color: var(--text-tertiary);
    }

    .metric-input {
      font-family: var(--text-mono);
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      background: transparent;
      border: none;
      outline: none;
      width: 100%;
      min-width: 0;
      -webkit-appearance: none;
      inputmode: decimal;
    }

    .metric-input::placeholder {
      color: var(--text-tertiary);
      opacity: 0.5;
    }

    .metric-input::-webkit-inner-spin-button,
    .metric-input::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .metric-card.pass .metric-input { color: var(--accent-green); }
    .metric-card.fail .metric-input { color: var(--accent-red); }

    .metric-status {
      font-size: 18px;
      flex-shrink: 0;
      line-height: 1;
    }

    .metric-target {
      font-family: var(--text-mono);
      font-size: 10px;
      color: var(--text-tertiary);
      margin-top: 2px;
    }

    /* ─── RESET / CLEAR BUTTON ───────────────── */
    .actions-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .btn-export {
      margin-left: auto;
      border-color: rgba(0, 232, 122, 0.3);
      color: var(--accent-green);
    }

    .btn-export:active {
      background: var(--accent-green-dim);
    }

    /* ─── EXPORT MODAL ───────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    @media (min-width: 600px) {
      .modal-overlay { align-items: center; }
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 24px 20px 36px;
      width: 100%;
      max-width: 420px;
      transform: translateY(20px);
      transition: transform 0.25s cubic-bezier(0.34, 1.2, 0.64, 1);
    }

    @media (min-width: 600px) {
      .modal {
        border-radius: var(--radius);
        padding: 24px;
        transform: translateY(8px) scale(0.97);
      }
    }

    .modal-overlay.open .modal {
      transform: translateY(0) scale(1);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .modal-title {
      font-family: var(--text-mono);
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.04em;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-tertiary);
      font-size: 14px;
      cursor: pointer;
      padding: 4px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      line-height: 1;
    }

    .modal-subtitle {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-bottom: 18px;
    }

    .export-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .export-opt {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      width: 100%;
      text-align: left;
      transition: background 0.15s, border-color 0.15s;
    }

    .export-opt:active {
      background: var(--bg-card-hover);
      border-color: var(--border);
    }

    .export-opt-icon {
      font-size: 22px;
      line-height: 1;
      flex-shrink: 0;
    }

    .export-opt-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 2px;
    }

    .export-opt-desc {
      font-size: 12px;
      color: var(--text-tertiary);
    }

    .export-status {
      margin-top: 14px;
      font-family: var(--text-mono);
      font-size: 12px;
      color: var(--accent-green);
      min-height: 18px;
      text-align: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-secondary);
      font-family: var(--text-sans);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .btn:active {
      background: var(--bg-card-hover);
      color: var(--text-primary);
    }

    .btn-icon {
      font-size: 14px;
    }

    /* ─── SCORE SUMMARY ──────────────────────── */
    .score-bar-wrap {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
    }

    .score-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .score-title {
      font-family: var(--text-mono);
      font-size: 11px;
      color: var(--text-tertiary);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .score-fraction {
      font-family: var(--text-mono);
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .score-fraction .score-pass { color: var(--accent-green); }
    .score-fraction .score-fail { color: var(--accent-red); }

    .score-track {
      background: var(--bg-secondary);
      border-radius: var(--radius-pill);
      height: 6px;
      overflow: hidden;
    }

    .score-fill {
      height: 100%;
      border-radius: var(--radius-pill);
      background: var(--accent-green);
      transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .score-fill.low { background: var(--accent-red); }
    .score-fill.mid { background: var(--accent-amber); }

    .score-note {
      margin-top: 10px;
      font-size: 12px;
      color: var(--text-tertiary);
    }

    /* ─── HOVER (desktop only) ───────────────── */
    @media (hover: hover) and (pointer: fine) {
      .phase-tab:not(.active):hover {
        background: var(--bg-card-hover);
        border-color: #444;
      }

      .metric-card:hover {
        border-color: #333;
      }

      .btn:hover {
        background: var(--bg-card-hover);
        color: var(--text-primary);
        border-color: #444;
      }

      .btn-export:hover {
        background: var(--accent-green-dim);
        border-color: var(--accent-green);
        color: var(--accent-green);
      }

      .export-opt:hover {
        background: var(--bg-card-hover);
        border-color: var(--border);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header>
      <div class="logo">
        <div class="logo-label">Review Tool</div>
        <div class="logo-title">META<span>.</span>ADS</div>
      </div>
      <div class="date-badge" id="dateBadge"></div>
    </header>

    <!-- Phase Selector -->
    <div class="phase-section">
      <div class="section-label">Phase</div>
      <div class="phase-tabs" id="phaseTabs"></div>
    </div>

    <!-- Active Phase Header -->
    <div class="phase-header">
      <div class="phase-dot"></div>
      <div class="phase-header-content">
        <div class="phase-header-name" id="phaseHeaderName"></div>
        <div class="phase-header-desc" id="phaseHeaderDesc"></div>
      </div>
    </div>

    <!-- Objectives & Actions -->
    <div class="two-col" id="infoCards"></div>

    <!-- Metrics -->
    <div class="section-label metrics-label">Key Metrics</div>
    <div class="metrics-grid" id="metricsGrid"></div>

    <!-- Actions Row -->
    <div class="actions-row">
      <button class="btn" id="clearBtn" onclick="clearValues()">
        <span class="btn-icon">↺</span> Clear Values
      </button>
      <button class="btn btn-export" onclick="openExportModal()">
        <span class="btn-icon">↑</span> Export
      </button>
    </div>

    <!-- Export Modal -->
    <div class="modal-overlay" id="exportModal" onclick="closeExportModal(event)">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">Export Report</div>
          <button class="modal-close" onclick="closeExportModal()">✕</button>
        </div>
        <div class="modal-subtitle" id="exportSubtitle"></div>
        <div class="export-options">
          <button class="export-opt" onclick="exportAs('png')">
            <div class="export-opt-icon">🖼</div>
            <div class="export-opt-info">
              <div class="export-opt-name">PNG Image</div>
              <div class="export-opt-desc">Screenshot of current view</div>
            </div>
          </button>
          <button class="export-opt" onclick="exportAs('pdf')">
            <div class="export-opt-icon">📄</div>
            <div class="export-opt-info">
              <div class="export-opt-name">PDF</div>
              <div class="export-opt-desc">Printable document</div>
            </div>
          </button>
          <button class="export-opt" onclick="exportAs('text')">
            <div class="export-opt-icon">📋</div>
            <div class="export-opt-info">
              <div class="export-opt-name">Plain Text</div>
              <div class="export-opt-desc">Download as .txt file</div>
            </div>
          </button>
          <button class="export-opt" onclick="exportAs('copy')">
            <div class="export-opt-icon">⎘</div>
            <div class="export-opt-info">
              <div class="export-opt-name">Copy to Clipboard</div>
              <div class="export-opt-desc">Paste into Slack, Notes, etc.</div>
            </div>
          </button>
        </div>
        <div class="export-status" id="exportStatus"></div>
      </div>
    </div>

    <!-- Score Summary -->
    <div class="score-bar-wrap">
      <div class="score-header">
        <div class="score-title">Metrics Passing</div>
        <div class="score-fraction" id="scoreFraction">—</div>
      </div>
      <div class="score-track">
        <div class="score-fill" id="scoreFill" style="width:0%"></div>
      </div>
      <div class="score-note" id="scoreNote">Enter values above to see your score.</div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
