<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>World Clock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset & Base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0b0c0e;
      --surface:     #111316;
      --surface2:    #161820;
      --border:      #1e2126;
      --border-hi:   #2a2f38;
      --text-pri:    #e8eaf0;
      --text-sec:    #5a6070;
      --text-dim:    #30343c;
      --accent:      #4f9cf9;
      --accent-lo:   rgba(79, 156, 249, 0.08);
      --radius:      12px;
      --mono: 'DM Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    html { height: 100%; }

    body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text-pri);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    /* ─── Page ─────────────────────────────────────────────── */
    .page {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      padding: 24px 20px 20px;
      gap: 24px;
      max-width: 960px;
      margin: 0 auto;
    }

    /* ─── Header ───────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .header-label {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      color: var(--text-sec);
    }

    .header-date {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-sec);
      letter-spacing: 0.04em;
    }

    /* ─── Live Grid ────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .card.us { grid-column: 1 / -1; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px 18px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s;
      cursor: default;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent-lo);
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .card:active::before { opacity: 1; }
    .card:active          { border-color: var(--border-hi); }

    @media (hover: hover) and (pointer: fine) {
      .card:hover         { border-color: var(--border-hi); }
      .card:hover::before { opacity: 1; }
    }

    .card.us { border-color: var(--border-hi); }


    .card-zone {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.16em;
      color: var(--text-sec);
      text-transform: uppercase;
    }

    .card-city {
      font-family: var(--sans);
      font-size: 15px;
      font-weight: 300;
      color: var(--text-pri);
      letter-spacing: 0.01em;
      margin-top: 2px;
    }

    .card.us .card-city { font-size: 17px; }

    .card-time {
      font-family: var(--mono);
      font-size: 36px;
      font-weight: 300;
      color: var(--text-pri);
      letter-spacing: -0.02em;
      line-height: 1;
      margin-top: 10px;
    }

    .card.us .card-time { font-size: 52px; }

    .card-time .ampm {
      font-size: 0.38em;
      font-weight: 400;
      color: var(--text-sec);
      letter-spacing: 0.08em;
      margin-left: 6px;
      vertical-align: middle;
      position: relative;
      top: -0.1em;
    }

    .card-sub {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text-sec);
      margin-top: 6px;
      letter-spacing: 0.04em;
    }

    .card.us .card-sub { font-size: 14px; }

    .card-offset {
      position: absolute;
      top: 18px; right: 18px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.06em;
    }

    /* ─── Converter ────────────────────────────────────────── */
    .converter {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .converter-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }

    .converter-label {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.16em;
      color: var(--text-sec);
      text-transform: uppercase;
      flex: 1;
    }

    .converter-inputs {
      display: flex;
      gap: 8px;
      padding: 16px 18px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      align-items: center;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex: 1;
      min-width: 100px;
    }

    .input-group label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.14em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .input-group select,
    .input-group input[type="time"] {
      background: var(--surface2);
      border: 1px solid var(--border-hi);
      border-radius: 6px;
      color: var(--text-pri);
      font-family: var(--mono);
      font-size: 13px;
      padding: 8px 10px;
      outline: none;
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
      touch-action: manipulation;
    }

    /* Force numeric keyboard on iPhone for time input */
    .input-group input[type="time"] {
      inputmode: numeric;
    }

    .input-group select:focus,
    .input-group input[type="time"]:focus {
      border-color: var(--accent);
    }

    /* Style select arrow */
    .select-wrap {
      position: relative;
    }

    .select-wrap::after {
      content: '▾';
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      font-size: 11px;
      pointer-events: none;
    }

    /* ─── Converter Results ─────────────────────────────────── */
    .converter-results {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
    }

    .result-row {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .result-row:nth-child(even) { border-right: none; }
    .result-row:last-child,
    .result-row:nth-last-child(2):nth-child(odd) { border-bottom: none; }

    /* full-width NZ source row */
    .result-row.nz-row {
      grid-column: 1 / -1;
      background: var(--accent-lo);
      border-right: none;
      border-bottom: 1px solid var(--border);
    }

    .result-zone {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.14em;
      color: var(--text-sec);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .result-city {
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 300;
      color: var(--text-sec);
      margin-bottom: 6px;
    }

    .result-time {
      font-family: var(--mono);
      font-size: 26px;
      font-weight: 300;
      color: var(--text-pri);
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .result-row.nz-row .result-time { font-size: 32px; color: var(--accent); }
    .result-row.nz-row .result-city { color: var(--text-pri); }

    .result-time .ampm {
      font-size: 0.38em;
      color: var(--text-sec);
      letter-spacing: 0.08em;
      margin-left: 4px;
      vertical-align: middle;
      position: relative;
      top: -0.1em;
    }

    .result-day {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text-sec);
      margin-top: 5px;
      letter-spacing: 0.04em;
    }

    /* ─── Footer ───────────────────────────────────────────── */
    .footer {
      border-top: 1px solid var(--border);
      padding-top: 14px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-align: center;
    }

    /* ─── Desktop ──────────────────────────────────────────── */
    @media (min-width: 600px) {
      .page  { padding: 32px 32px 24px; gap: 28px; }
      .grid  { grid-template-columns: repeat(4, 1fr); gap: 14px; }
      .card.us { grid-column: 1 / -1; }
      .card-time          { font-size: 38px; }
      .card.us .card-time { font-size: 64px; }
      .card-city          { font-size: 14px; }
      .card.us .card-city { font-size: 18px; }

      .converter-results  { grid-template-columns: repeat(4, 1fr); }
      .result-row         { border-right: 1px solid var(--border); }
      .result-row:nth-child(even)    { border-right: 1px solid var(--border); }
      .result-row:nth-last-child(-n+4) { border-bottom: none; }
      /* last in each desktop row has no right border */
      .result-row:nth-child(4n)      { border-right: none; }

      .converter-inputs   { flex-wrap: nowrap; }
      .input-group        { min-width: auto; }
    }

    @media (min-width: 900px) {
      .card-time { font-size: 42px; }
    }
  </style>
</head>
<body>
  <div class="page">

    <header class="header">
      <span class="header-label">WORLD CLOCK</span>
      <span class="header-date" id="utc-label"></span>
    </header>

    <main class="grid" id="clock-grid"></main>

    <!-- ── Converter ── -->
    <section class="converter" aria-label="Time converter">
      <div class="converter-header">
        <span class="converter-label">Convert from NZ Time</span>
      </div>
      <div class="converter-inputs">
        <div class="input-group">
          <label for="conv-day">Day</label>
          <div class="select-wrap">
            <select id="conv-day" touch-action="manipulation">
              <option value="0">Sunday</option>
              <option value="1">Monday</option>
              <option value="2">Tuesday</option>
              <option value="3">Wednesday</option>
              <option value="4">Thursday</option>
              <option value="5">Friday</option>
              <option value="6">Saturday</option>
            </select>
          </div>
        </div>
        <div class="input-group">
          <label for="conv-time">NZ Time</label>
          <input type="time" id="conv-time" value="16:00" inputmode="numeric" />
        </div>
      </div>
      <div class="converter-results" id="conv-results"></div>
    </section>

    <footer class="footer">
      <span id="footer-utc"></span>
    </footer>

  </div>
  <script src="script.js"></script>
</body>
</html>
