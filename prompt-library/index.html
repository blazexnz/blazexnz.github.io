<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Prompt Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
/* ─── RESET & VARIABLES ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:        #1a1814;
  --ink-mid:    #4a4540;
  --ink-light:  #9a948c;
  --paper:      #f5f2ec;
  --paper-warm: #ede9e0;
  --cream:      #faf8f4;
  --rule:       #ddd8ce;
  --accent:     #c1440e;
  --accent-dim: #f0d5cb;
  --card-bg:    #ffffff;
  --font-display: 'Playfair Display', Georgia, serif;
  --font-mono:    'IBM Plex Mono', 'Courier New', monospace;
  --font-body:    'IBM Plex Sans', system-ui, sans-serif;
  --radius: 6px;
  --shadow: 0 1px 3px rgba(26,24,20,.08), 0 4px 16px rgba(26,24,20,.06);
  --shadow-lg: 0 8px 32px rgba(26,24,20,.16);
  --transition: 200ms cubic-bezier(.4,0,.2,1);
}

/* ─── BASE ─── */
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font-body);
  background: var(--paper);
  color: var(--ink);
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
}

/* ─── HEADER ─── */
.header {
  background: var(--cream);
  border-bottom: 1px solid var(--rule);
  padding: 20px 20px 0;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 16px;
}
.header-title { display: flex; align-items: center; gap: 10px; }
.header-icon {
  font-size: 20px;
  color: var(--accent);
  font-family: var(--font-mono);
  line-height: 1;
}
h1 {
  font-family: var(--font-display);
  font-size: clamp(20px, 5vw, 26px);
  font-weight: 600;
  color: var(--ink);
  letter-spacing: -0.02em;
}

/* ─── TOOLBAR ─── */
.toolbar { display: flex; flex-direction: column; gap: 10px; padding-bottom: 14px; }
.search-wrap { position: relative; }
.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--ink-light);
  font-size: 18px;
  pointer-events: none;
  font-family: var(--font-mono);
}
#searchInput {
  width: 100%;
  height: 40px;
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  padding: 0 14px 0 36px;
  font-family: var(--font-body);
  font-size: 14px;
  background: var(--paper-warm);
  color: var(--ink);
  outline: none;
  transition: border-color var(--transition);
  -webkit-appearance: none;
}
#searchInput:focus { border-color: var(--ink-mid); background: white; }
#searchInput::placeholder { color: var(--ink-light); }

.filter-wrap {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
  padding-bottom: 2px;
}
.filter-wrap::-webkit-scrollbar { display: none; }
.filter-chip {
  touch-action: manipulation;
  flex-shrink: 0;
  height: 30px;
  padding: 0 12px;
  border-radius: 99px;
  border: 1px solid var(--rule);
  background: transparent;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--ink-mid);
  cursor: pointer;
  white-space: nowrap;
  transition: background var(--transition), color var(--transition), border-color var(--transition);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.filter-chip.active { background: var(--ink); color: var(--cream); border-color: var(--ink); }
.filter-chip:active { transform: scale(0.96); }
@media (hover: hover) and (pointer: fine) {
  .filter-chip:not(.active):hover { border-color: var(--ink-mid); color: var(--ink); }
}

/* ─── MAIN / GRID ─── */
.main { padding: 20px; max-width: 960px; margin: 0 auto; }
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 14px;
}

/* ─── CARD ─── */
.card {
  background: var(--card-bg);
  border: 1px solid var(--rule);
  border-radius: 8px;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  animation: fadeUp 250ms ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.card-top { padding: 16px 16px 12px; flex: 1; }
.card-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
.card-tag {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--accent);
  background: var(--accent-dim);
  border-radius: 4px;
  padding: 2px 7px;
}
.card-title {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.3;
  margin-bottom: 6px;
  letter-spacing: -0.01em;
}
.card-desc { font-size: 13px; color: var(--ink-mid); line-height: 1.5; font-weight: 300; }
.card-preview {
  font-family: var(--font-mono);
  font-size: 11.5px;
  color: var(--ink-light);
  background: var(--paper-warm);
  border-top: 1px solid var(--rule);
  padding: 10px 16px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-actions { display: flex; border-top: 1px solid var(--rule); }
.card-btn {
  touch-action: manipulation;
  flex: 1;
  height: 42px;
  border: none;
  background: transparent;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.05em;
  cursor: pointer;
  color: var(--ink-mid);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: background var(--transition), color var(--transition);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.card-btn + .card-btn { border-left: 1px solid var(--rule); }
.card-btn.copy-btn { color: var(--ink-mid); }
.card-btn.copy-btn.copied { color: var(--accent); }
.card-btn:active { background: var(--paper-warm); }
@media (hover: hover) and (pointer: fine) {
  .card-btn:hover { background: var(--paper-warm); color: var(--ink); }
  .card-btn.copy-btn:hover { color: var(--accent); }
  .card-btn.del-btn:hover { color: #c0392b; background: #fff5f5; }
}

/* ─── BUTTONS ─── */
.btn-add {
  touch-action: manipulation;
  display: flex;
  align-items: center;
  gap: 6px;
  height: 38px;
  padding: 0 16px;
  background: var(--ink);
  color: var(--cream);
  border: none;
  border-radius: var(--radius);
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.04em;
  cursor: pointer;
  white-space: nowrap;
  transition: background var(--transition);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.btn-add:active { background: var(--ink-mid); }
@media (hover: hover) and (pointer: fine) { .btn-add:hover { background: var(--accent); } }

/* ─── MODAL ─── */
.backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(26,24,20,.45);
  z-index: 200;
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
}
.backdrop.visible { display: block; }
.modal {
  display: none;
  position: fixed;
  inset: auto 0 0;
  background: var(--cream);
  border-radius: 14px 14px 0 0;
  z-index: 201;
  box-shadow: var(--shadow-lg);
  max-height: 92dvh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.modal.visible { display: flex; flex-direction: column; }
@media (min-width: 600px) {
  .modal {
    inset: 50% auto auto 50%;
    transform: translate(-50%, -50%);
    width: 520px;
    max-height: 88dvh;
    border-radius: 10px;
  }
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 20px 0;
}
.modal-header h2 {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.02em;
}
.btn-close {
  touch-action: manipulation;
  width: 32px;
  height: 32px;
  border: 1px solid var(--rule);
  border-radius: 50%;
  background: transparent;
  font-size: 14px;
  color: var(--ink-mid);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background var(--transition);
  -webkit-tap-highlight-color: transparent;
}
.btn-close:active { background: var(--paper-warm); }
@media (hover: hover) and (pointer: fine) {
  .btn-close:hover { background: var(--paper-warm); color: var(--ink); }
}
.modal-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field-label {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-light);
}
.field input,
.field textarea {
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  padding: 10px 12px;
  font-family: var(--font-body);
  font-size: 15px;
  color: var(--ink);
  background: var(--paper-warm);
  outline: none;
  resize: none;
  -webkit-appearance: none;
  transition: border-color var(--transition), background var(--transition);
}
.field input:focus,
.field textarea:focus { border-color: var(--ink-mid); background: white; }
.field textarea {
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.6;
  min-height: 130px;
}

/* ─── TAG PILL INPUT ─── */
.tag-input-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  padding: 7px 10px;
  background: var(--paper-warm);
  cursor: text;
  transition: border-color var(--transition), background var(--transition);
  min-height: 42px;
}
.tag-input-wrap:focus-within { border-color: var(--ink-mid); background: white; }

.tag-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--accent);
  background: var(--accent-dim);
  border-radius: 4px;
  padding: 3px 8px;
  white-space: nowrap;
  animation: pillPop 150ms ease both;
}
@keyframes pillPop {
  from { opacity: 0; transform: scale(0.85); }
  to   { opacity: 1; transform: scale(1); }
}
.tag-pill-remove {
  touch-action: manipulation;
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
  color: var(--accent);
  font-size: 13px;
  line-height: 1;
  opacity: 0.6;
  display: flex;
  align-items: center;
  transition: opacity var(--transition);
  -webkit-tap-highlight-color: transparent;
}
.tag-pill-remove:active { opacity: 1; }
@media (hover: hover) and (pointer: fine) {
  .tag-pill-remove:hover { opacity: 1; }
}

#tagInput {
  border: none;
  background: transparent;
  outline: none;
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--ink);
  min-width: 100px;
  flex: 1;
  padding: 2px 0;
  -webkit-appearance: none;
}
#tagInput::placeholder { color: var(--ink-light); }

.tag-hint {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-light);
  letter-spacing: 0.04em;
  margin-top: 2px;
}

/* ─── MODAL FOOTER ─── */
.modal-footer {
  display: flex;
  gap: 10px;
  padding: 0 20px 28px;
  padding-bottom: max(28px, env(safe-area-inset-bottom));
}
.btn-ghost, .btn-primary {
  touch-action: manipulation;
  flex: 1;
  height: 46px;
  border-radius: var(--radius);
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: background var(--transition), color var(--transition);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.btn-ghost { background: transparent; border: 1px solid var(--rule); color: var(--ink-mid); }
.btn-ghost:active { background: var(--paper-warm); }
.btn-primary { background: var(--ink); border: 1px solid var(--ink); color: var(--cream); }
.btn-primary:active { background: var(--accent); border-color: var(--accent); }
@media (hover: hover) and (pointer: fine) {
  .btn-ghost:hover { background: var(--paper-warm); color: var(--ink); }
  .btn-primary:hover { background: var(--accent); border-color: var(--accent); }
}

/* ─── TOAST ─── */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink);
  color: var(--cream);
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.05em;
  padding: 10px 20px;
  border-radius: 99px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 250ms ease, transform 250ms ease;
  white-space: nowrap;
  z-index: 300;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ─── EMPTY STATE ─── */
.empty-state { text-align: center; padding: 60px 20px; color: var(--ink-light); }
.empty-icon { display: block; font-size: 32px; margin-bottom: 16px; color: var(--rule); }
.empty-state p { font-family: var(--font-body); font-size: 15px; line-height: 1.6; font-weight: 300; }
.empty-state strong { font-weight: 500; color: var(--ink-mid); }

/* ─── COUNT BADGE ─── */
.count-badge {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-light);
  margin-bottom: 12px;
  letter-spacing: 0.04em;
}

/* ─── ANIMATIONS ─── */
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-6px); }
  40%     { transform: translateX(6px); }
  60%     { transform: translateX(-4px); }
  80%     { transform: translateX(4px); }
}
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="header-title">
        <span class="header-icon">⌘</span>
        <h1>Prompt Library</h1>
      </div>
      <button class="btn-add" id="btnAdd" touch-action="manipulation">
        <span>+</span> New Prompt
      </button>
    </div>
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="search" id="searchInput" placeholder="Search prompts…" autocomplete="off" />
      </div>
      <div class="filter-wrap" id="filterWrap">
        <button class="filter-chip active" data-tag="all" touch-action="manipulation">All</button>
      </div>
    </div>
  </header>

  <!-- MAIN GRID -->
  <main class="main">
    <div class="grid" id="grid"></div>
    <div class="empty-state" id="emptyState" hidden>
      <span class="empty-icon">✦</span>
      <p>No prompts yet.<br/>Hit <strong>+ New Prompt</strong> to begin.</p>
    </div>
  </main>

  <!-- MODAL BACKDROP -->
  <div class="backdrop" id="backdrop"></div>

  <!-- ADD / EDIT MODAL -->
  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-header">
      <h2 id="modalTitle">New Prompt</h2>
      <button class="btn-close" id="btnClose" touch-action="manipulation" aria-label="Close">✕</button>
    </div>
    <div class="modal-body">
      <label class="field">
        <span class="field-label">Title</span>
        <input type="text" id="fieldTitle" placeholder="e.g. Rewrite for Clarity" autocomplete="off" />
      </label>

      <div class="field">
        <span class="field-label">Tags</span>
        <div class="tag-input-wrap" id="tagInputWrap">
          <!-- pills injected here by JS -->
          <input type="text" id="tagInput" placeholder="Type a tag, press Enter or comma…" autocomplete="off" list="tagSuggestions" />
          <datalist id="tagSuggestions"></datalist>
        </div>
        <span class="tag-hint">Enter or , to add · tap × to remove</span>
      </div>

      <label class="field">
        <span class="field-label">Description</span>
        <input type="text" id="fieldDesc" placeholder="What is this prompt for?" autocomplete="off" />
      </label>
      <label class="field">
        <span class="field-label">Prompt</span>
        <textarea id="fieldPrompt" rows="6" placeholder="Paste your full prompt here…"></textarea>
      </label>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" id="btnCancel" touch-action="manipulation">Cancel</button>
      <button class="btn-primary" id="btnSave" touch-action="manipulation">Save Prompt</button>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
